name: Release

# Builds native installers with jpackage on each platform and publishes them as
# GitHub Release assets. Push a tag like `v1.2.3` to cut a release; the manual
# trigger builds the same installers as downloadable workflow artifacts without
# publishing a release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # SWT version; must match the fragments published on Maven Central.
  SWT_VERSION: 3.128.0
  JAVA_VERSION: '25'

jobs:
  package:
    name: Package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            swt_artifact: org.eclipse.swt.gtk.linux.x86_64
            pkg_type: deb
            ext: deb
          - os: macos-13
            label: macos-x64
            swt_artifact: org.eclipse.swt.cocoa.macosx.x86_64
            pkg_type: dmg
            ext: dmg
          - os: macos-latest
            label: macos-aarch64
            swt_artifact: org.eclipse.swt.cocoa.macosx.aarch64
            pkg_type: dmg
            ext: dmg
          - os: windows-latest
            label: windows-x64
            swt_artifact: org.eclipse.swt.win32.win32.x86_64
            pkg_type: msi
            ext: msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Determine app version
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="1.0.0"
          fi
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building Canban $VERSION for ${{ matrix.label }}"

      # --- platform-specific packaging prerequisites ----------------------

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot binutils

      - name: Install WiX Toolset (Windows MSI)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wix = Get-ChildItem 'C:\Program Files (x86)' -Filter 'WiX Toolset*' -Directory |
                 Select-Object -First 1
          "$($wix.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # --- build ----------------------------------------------------------

      - name: Compile and assemble app jar
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/classes build/app
          SWT_JAR="build/app/swt.jar"
          curl -fsSL -o "$SWT_JAR" \
            "https://repo1.maven.org/maven2/org/eclipse/platform/${{ matrix.swt_artifact }}/${SWT_VERSION}/${{ matrix.swt_artifact }}-${SWT_VERSION}.jar"

          javac -cp "$SWT_JAR" -d build/classes $(find src -name '*.java')

          printf 'Main-Class: se.canban.app.Main\nClass-Path: swt.jar\n' > build/manifest.txt
          jar --create --file build/app/canban.jar --manifest build/manifest.txt -C build/classes .

      - name: Build installer with jpackage
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/dist
          jpackage \
            --type "${{ matrix.pkg_type }}" \
            --name Canban \
            --app-version "$APP_VERSION" \
            --vendor "se.canban" \
            --description "Canban - a filesystem-backed Kanban board" \
            --input build/app \
            --main-jar canban.jar \
            --main-class se.canban.app.Main \
            --dest build/dist \
            $( [ "${{ runner.os }}" = "Linux" ] && echo --linux-shortcut ) \
            $( [ "${{ runner.os }}" = "Windows" ] && echo --win-dir-chooser --win-menu --win-shortcut )

          # Normalise the produced file name so each platform's asset is distinct.
          produced=$(ls build/dist/*.${{ matrix.ext }})
          mv "$produced" "build/dist/Canban-${APP_VERSION}-${{ matrix.label }}.${{ matrix.ext }}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Canban-${{ matrix.label }}
          path: build/dist/Canban-*.${{ matrix.ext }}
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/dist/Canban-*.${{ matrix.ext }}
          fail_on_unmatched_files: true
